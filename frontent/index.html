<!DOCTYPE html>
<html>
<head>
  <title>3-Tier App</title>
</head>
<body>
  <h1>Frontend Running 🎉</h1>
  <button onclick="callAPI()">Call Backend</button>
  <p id="output"></p>

  <script>
    function callAPI() {
      fetch('http://localhost:3000/api')
        .then(res => res.json())
        .then(data => {
          document.getElementById('output').innerText = data.message;
        });
    }
  </script>
</body>
</html>
